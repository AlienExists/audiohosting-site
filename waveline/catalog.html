<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <header class="nav">
        <div class="nav__inner container">
            <a href="index.html" class="nav__logo">Waveline</a>
            <nav class="nav__links">
                <a href="catalog.html">Каталог</a>
                <a href="upload.html">Загрузить</a>
                <a href="profile.html">Профиль</a>
            </nav>
            <button class="btn btn--sm">Войти</button>
        </div>
    </header>

    <div class="filters">
        <div class="filters__tabs">
            <button class="tab tab--active">Всё</button>
            <button class="tab">Электронная</button>
            <button class="tab">Инструментальная</button>
            <button class="tab">Эмбиент</button>
        </div>
        <div class="filters__sort">
            <select class="select">
                <option>Новые</option>
                <option>Популярные</option>
            </select>
        </div>
    </div>
    <div class="player" id="player" style="display:none;">
  <div class="player__track">
    <div class="player__cover" id="playerCover"></div>
    <div class="player__info">
      <span class="player__title" id="playerTitle">—</span>
      <span class="player__artist" id="playerArtist">—</span>
    </div>
  </div>

  <div class="player__controls">
    <button class="player__btn" id="playerPrev">⏮</button>
    <button class="player__btn player__btn--main" id="playerPlay">▶</button>
    <button class="player__btn" id="playerNext">⏭</button>
  </div>

  <div class="player__progress-wrap">
    <span class="player__time" id="playerCurrent">0:00</span>
    <div class="player__bar" id="playerBar">
      <div class="player__bar-fill" id="playerFill"></div>
    </div>
    <span class="player__time" id="playerDuration">0:00</span>
  </div>

  <div class="player__volume-wrap">
    <span class="player__volume-icon">♪</span>
    <input class="player__volume" id="playerVolume" type="range" min="0" max="1" step="0.02" value="0.8">
  </div>
</div>

<audio id="audioEl" preload="metadata"></audio>
    <script type="module" src="nav.js"></script>
</body>

</html>
