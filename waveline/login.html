<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <title>Вход</title>
</head>

<body>
    <div class="auth-page">

        <a href="index.html" class="auth-logo">Waveline</a>

        <div class="auth-card">

            <div class="auth-tabs">
                <button class="auth-tab auth-tab--active" data-mode="login">Войти</button>
                <button class="auth-tab" data-mode="register">Регистрация</button>

            </div>

            <form class="auth-form">
                <!-- Только для регистрации — скрыто по умолчанию -->
                <div class="form-group form-group--username" style="display:none;">
                    <label class="form-label">Имя пользователя</label>
                    <input class="form-input" type="text" name="username" placeholder="kira.wav">
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input class="form-input" type="email" name="email" placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input class="form-input" type="password" name="password" placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn--primary btn--full">Войти</button>

                <p class="auth-hint">Нет аккаунта? <a href="#">Зарегистрироваться</a></p>
            </form>
            <script type="module" src="login.js"></script>

        </div>

    </div>

</body>

</html>
